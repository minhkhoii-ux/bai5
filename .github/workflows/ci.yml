name: Java CI with Maven & JaCoCo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Đổi thành phiên bản Java dự án bạn đang dùng
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify with Maven
        # Lệnh verify sẽ chạy test, tạo report và kiểm tra rule 80% của JaCoCo
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Luôn upload báo cáo kể cả khi build fail do không đủ coverage
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7 # Giữ lại báo cáo trong 7 ngày